name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────
  # Backend — Tests unitaires (aucune DB requise)
  # ──────────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: zsdevweb_test
          POSTGRES_USER: zsdevweb
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      DJANGO_SETTINGS_MODULE: zsdevweb.settings.development
      DATABASE_URL: postgresql://zsdevweb:testpassword@localhost:5432/zsdevweb_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-secret-key-not-used-in-prod
      DEBUG: "True"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.dev.txt

      - name: Install dependencies
        run: pip install -r requirements.dev.txt

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

      - name: Check Django configuration
        run: python manage.py check --deploy 2>/dev/null || python manage.py check

  # ──────────────────────────────────────────────
  # Frontend — Build + lint
  # ──────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build
        env:
          VITE_API_URL: https://zsdevweb.fr
          VITE_APP_NAME: Zsdevweb

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ──────────────────────────────────────────────
  # Docker — Vérification des builds
  # ──────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: false
          tags: zsdevweb-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: false
          tags: zsdevweb-frontend:test
          build-args: |
            VITE_API_URL=https://zsdevweb.fr
            VITE_APP_NAME=Zsdevweb
          cache-from: type=gha
          cache-to: type=gha,mode=max
