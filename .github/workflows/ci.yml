name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────
  # Backend — Tests unitaires (aucune DB requise)
  # ──────────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: zsdevweb_test
          POSTGRES_USER: zsdevweb
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      DJANGO_SETTINGS_MODULE: zsdevweb.settings.development
      DATABASE_URL: postgresql://zsdevweb:testpassword@localhost:5432/zsdevweb_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-secret-key-not-used-in-prod
      DEBUG: "True"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.dev.txt

      - name: Install dependencies
        run: pip install -r requirements.dev.txt

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

      - name: Check Django configuration
        run: python manage.py check --deploy 2>/dev/null || python manage.py check

      - name: Validate OpenAPI schema generation
        run: python manage.py spectacular --file /tmp/schema.yaml --validate

  # ──────────────────────────────────────────────
  # Frontend — Build + lint
  # ──────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build
        env:
          VITE_API_URL: https://zsdevweb.fr
          VITE_APP_NAME: Zsdevweb

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ──────────────────────────────────────────────
  # Frontend — Tests E2E Playwright
  # ──────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [frontend-build]

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build app for E2E
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000
          VITE_APP_NAME: Zsdevweb

      - name: Run E2E tests
        run: npx playwright test --reporter=github
        env:
          E2E_BASE_URL: http://localhost:4173
          CI: true
        # Utilise vite preview sur le build
        # (modifié dans playwright.config.js pour CI)

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # ──────────────────────────────────────────────
  # Docker — Vérification des builds
  # ──────────────────────────────────────────────
  nginx-config-check:
    name: Nginx Config Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate nginx production config
        run: docker run --rm -v "$PWD/nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro" nginx:1.25-alpine nginx -t

      - name: Verify nginx security directives
        run: |
          grep -q 'Content-Security-Policy' nginx/nginx.prod.conf
          grep -q 'X-Frame-Options' nginx/nginx.prod.conf
          grep -q 'X-Content-Type-Options' nginx/nginx.prod.conf
          grep -q 'server_tokens off;' nginx/nginx.prod.conf

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build, nginx-config-check]
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: false
          tags: zsdevweb-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: false
          tags: zsdevweb-frontend:test
          build-args: |
            VITE_API_URL=https://zsdevweb.fr
            VITE_APP_NAME=Zsdevweb
          cache-from: type=gha
          cache-to: type=gha,mode=max
