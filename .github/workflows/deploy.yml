name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      confirm:
        description: "Tapez 'deploy' pour confirmer"
        required: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event.inputs.confirm == 'deploy')

    environment:
      name: production
      url: https://zsdevweb.fr

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/zsdevweb-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/zsdevweb-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/zsdevweb-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/zsdevweb-frontend:${{ github.sha }}
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_APP_NAME=Zsdevweb
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/zsdevweb

            # Pull les dernières images
            docker pull ${{ secrets.DOCKER_USERNAME }}/zsdevweb-backend:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/zsdevweb-frontend:latest

            # Mettre à jour le docker-compose.prod.yml avec les nouveaux tags
            export BACKEND_IMAGE=${{ secrets.DOCKER_USERNAME }}/zsdevweb-backend:latest
            export FRONTEND_IMAGE=${{ secrets.DOCKER_USERNAME }}/zsdevweb-frontend:latest

            # Redémarrer avec zero-downtime
            docker-compose -f docker-compose.prod.yml up -d --no-deps backend
            sleep 10
            docker-compose -f docker-compose.prod.yml up -d --no-deps frontend nginx

            # Nettoyage
            docker image prune -f

            echo "✅ Déploiement terminé — $(date)"

      - name: Smoke test
        run: |
          sleep 15
          curl -f https://zsdevweb.fr/api/v1/health/ || exit 1
          echo "✅ Health check OK"
